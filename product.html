<!DOCTYPE html>
<html lang="uk">
<head>
 <meta charset="UTF-8">
    <title>PickMe</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="src/logo2.png">
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.14.0/gsap.min.js"></script>

<style>



/* ===== PRODUCT (PREMIUM GLASS GRADIENT) ===== */
.product {
    display: flex;
    gap: 24px;

    max-width: 950px;
    margin: 60px auto;
    padding: 28px;

    border-radius: 22px;

    /* 🔥 живий градієнт + глибина */
    background: linear-gradient(135deg,
        rgba(92, 46, 179, 0.85),
        rgba(139, 92, 246, 0.75),
        rgba(244, 63, 158, 0.75)
    );

    /* 🧊 скло */
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    /* ✨ обводка скла */
    border: 1px solid rgba(255,255,255,0.25);

    /* 💎 глибока тінь */
    box-shadow:
        0 25px 60px rgba(92, 46, 179, 0.35),
        0 10px 25px rgba(0,0,0,0.25),
        inset 0 0 20px rgba(255,255,255,0.08);

    color: #fff;
}

/* IMAGE (glass frame) */
.product img {
    width: 270px;
    height: 270px;

    object-fit: cover;

    border-radius: 18px;

    border: 2px solid rgba(255,255,255,0.35);

    box-shadow:
        0 15px 35px rgba(0,0,0,0.35),
        inset 0 0 10px rgba(255,255,255,0.1);
}

/* INFO */
.product-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
}

/* TITLE */
.product-title {
    font-size: 30px;
    font-weight: 900;

    color: #fff;

    text-shadow:
        0 0 12px rgba(255,255,255,0.25);
}

/* DESCRIPTION */
.product-description {
    font-size: 15px;
    font-weight: 500;

    color: rgba(255,255,255,0.9);

    line-height: 1.6;
}

/* PRICE */
.product-price {
    font-size: 28px;
    font-weight: 900;

    color: #fff;

    text-shadow:
        0 0 10px rgba(244,63,158,0.5),
        0 0 18px rgba(139,92,246,0.4);
}

/* BUTTON */
.btn {
    padding: 13px 24px;

    background: linear-gradient(135deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.12)
    );

    border: 1px solid rgba(255,255,255,0.35);

    color: #fff;
    font-weight: 800;

    border-radius: 14px;

    cursor: pointer;

    width: 180px;

    backdrop-filter: blur(10px);

    transition: 0.3s ease;
}

.btn:hover {
    transform: translateY(-3px) scale(1.03);

    box-shadow:
        0 15px 35px rgba(244,63,158,0.3);
}

/* ===== REVIEWS (MATCHING GLASS STYLE) ===== */
.reviews {
    max-width: 950px;
    margin: 30px auto;
    padding: 28px;

    border-radius: 22px;

    background: linear-gradient(135deg,
        rgba(139, 92, 246, 0.75),
        rgba(92, 46, 179, 0.75),
        rgba(244, 63, 158, 0.7)
    );

    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,0.25);

    box-shadow:
        0 25px 60px rgba(0,0,0,0.25),
        inset 0 0 20px rgba(255,255,255,0.08);

    color: #fff;
}

/* TITLE */
.reviews h2 {
    font-size: 26px;
    font-weight: 900;

    color: #fff;

    text-shadow: 0 0 12px rgba(255,255,255,0.25);

    margin-bottom: 18px;
}

/* REVIEW ITEM */
.review {
    padding: 14px 0;

    border-bottom: 1px solid rgba(255,255,255,0.15);
}

.review:last-child {
    border-bottom: none;
}

/* NAME */
.review-name {
    font-weight: 900;
    color: #fff;

    text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* TEXT */
.review-text {
    margin-top: 5px;

    font-weight: 500;
    color: rgba(255,255,255,0.88);

    line-height: 1.5;
}
</style>

</head>
<body>
<header class ="header"></header>
<main>
    <div class="div-cart"></div>
</main>
<footer class="footer"></footer>
<script src="./js/components.js"></script>
<script src="./js/product.js"></script>
<script src="js/cart.js"></script>
</body>
</html>

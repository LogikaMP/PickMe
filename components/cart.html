<style>/* === ГОЛОВНИЙ КОНТЕЙНЕР КОШИКА === */

/* ===== CART (GLASS + NEON GRADIENT UI) ===== */
.cart {
  position: fixed;
  padding: 2%;
  top: 10vh;
  right: 1%;
  width: fit-content;
  max-width: 35%;
  min-width: 340px;
  height: 90vh;

  /* 🔥 GLASS GRADIENT BACKGROUND */
  background: linear-gradient(135deg,
    rgba(92, 46, 179, 0.85),
    rgba(139, 92, 246, 0.85),
    rgba(244, 63, 158, 0.85)
  );

  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.2);

  box-shadow:
    -10px 0 40px rgba(92, 46, 179, 0.35),
    inset 0 0 40px rgba(255,255,255,0.08);

  display: flex;
  flex-direction: column;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

  z-index: 1000;

  opacity: 0;
  transform: translateX(120%);
  pointer-events: none;
  transition: all 0.35s ease;
}

/* ACTIVE */
.cart.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

/* ===== HEADER ===== */
.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 20px;

  border-bottom: 1px solid rgba(255,255,255,0.15);
}

.cart-title {
  margin: 0;
  font-size: 1.6rem;

  color: #fff;
  font-weight: 800;

  text-shadow: 0 0 10px rgba(244,63,158,0.4);
}

.close-btn {
  background: transparent;
  border: none;
  font-size: 1.2rem;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
}

.close-btn:hover {
  color: #fff;
}

/* ===== ITEMS ===== */
.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 20px;

  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* ===== ITEM CARD ===== */
.cart-item {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;

  gap: 12px;
  padding: 12px;

  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 14px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* LEFT */
.cart-item .left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* IMAGE */
.item-image {
  width: 60px;
  height: 60px;
  object-fit: cover;

  border-radius: 12px;

  border: 2px solid rgba(244,63,158,0.6);

  box-shadow:
    0 6px 15px rgba(0,0,0,0.25),
    0 0 10px rgba(139,92,246,0.3);
}

/* NAME */
.item-name {
  margin: 0;
  font-size: 0.95rem;

  color: #fff;
}

/* QTY */
.chengi {
  display: flex;
  align-items: center;
  gap: 6px;

  background: rgba(255,255,255,0.15);
  padding: 4px 8px;
  border-radius: 10px;

  border: 1px solid rgba(255,255,255,0.2);
}

.qty-btn {
  background: transparent;
  border: none;
  font-size: 1.1rem;

  color: #fff;
  cursor: pointer;
}

.qty-btn:hover {
  transform: scale(1.2);
  color: var(--pink);
}

/* COUNT */
.item-count {
  min-width: 20px;
  text-align: center;
  font-weight: 700;

  color: #fff;
}

/* PRICE */
.allprise {
  font-weight: 800;

  color: var(--pink);

  text-shadow:
    0 0 10px rgba(244,63,158,0.5);
}

/* DELETE */
.delete-btn {
  background: transparent;
  border: none;
  cursor: pointer;

  color: rgba(255,255,255,0.6);
}

.delete-btn:hover {
  color: #ff4d4d;
  transform: scale(1.1);
}

/* ===== FOOTER ===== */
.cart-footer {
  padding: 20px;

  border-top: 1px solid rgba(255,255,255,0.15);
}

.total {
  margin: 0 0 20px 0;
  font-size: 1.3rem;

  display: flex;
  justify-content: space-between;

  color: #fff;
}

.checkout-btn {
  width: 100%;
  padding: 16px;

  border: none;
  border-radius: 50px;

  background: linear-gradient(135deg,
    var(--pink),
    var(--violet)
  );

  color: white;
  font-size: 1.1rem;
  font-weight: 700;

  cursor: pointer;

  box-shadow:
    0 10px 25px rgba(244,63,158,0.35),
    0 0 20px rgba(139,92,246,0.25);

  transition: 0.3s ease;
}

.checkout-btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow:
    0 15px 35px rgba(244,63,158,0.5),
    0 0 30px rgba(139,92,246,0.4);
}
</style>
<div class="cart" id="cartSidebar">
    <div class="cart-header">
        <h1 class="cart-title">Кошик</h1>
        <button class="close-btn" onclick="clouscart()">✕</button>
    </div>
<div class="cart-items">

            <h2 class="item-name">Стильна футболка</h2>
             <img  class="item-image" src="${product.image}">
            <div class="chengi">
                <button class="qty-btn" onclick="subitem()">-</button>
                <span class="item-count">1</span>
                <button class="qty-btn" onclick="additem()">+</button>
            </div>
            
            <h3 class="allprise">₴ 850</h3>
            <button class="delete-btn" onclick="deleteitem()">🗑</button>
        </div> -->
        </div>

    <div class="cart-footer">
        <div class="totalprise">
            <hr>
            <h2 class="total">Разом: ₴ 0</h2>
        </div>
        <button class="checkout-btn" onclick="dealmake()">Оформити замовлення</button>
    </div>
</div>

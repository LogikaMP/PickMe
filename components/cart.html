<style>/* === ГОЛОВНИЙ КОНТЕЙНЕР КОШИКА === */
.cart {
  position: fixed;
  padding: 2%;
  top: 10vh;
  right: 1%;
  width: fit-content;
  max-width: 35%;
  min-width: 340px;
  height: 90vh;
  background-color: #ffffff;
  box-shadow: -10px 0 40px rgba(92, 46, 179, 0.15);
  display: flex;
  flex-direction: column;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  z-index: 1000;

  /* 🔥 прихований стан */
  opacity: 0;
  transform: translateX(120%);
  pointer-events: none;
  transition: all 0.35s ease;
}
.cart.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}
/* === HEADER === */
.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 20px;
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
}

.cart-title {
  margin: 0;
  font-size: 1.5rem;
  color: var(--purple);
  font-weight: 700;
}

.close-btn {
  background: transparent;
  border: none;
  font-size: 1.2rem;
  color: #888;
  cursor: pointer;
}

.close-btn:hover {
  color: var(--pink2);
}

/* === ITEMS === */
.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* === ITEM === */
.cart-item {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: #fafafa;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
}

/* LEFT (image + name) */
.cart-item .left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* IMAGE */
.item-image {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); /* 👈 тінь */
}

/* NAME */
.item-name {
  margin: 0;
  font-size: 0.95rem;
  color: #333;
}

/* QTY */
.chengi {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #fff;
  padding: 4px 8px;
  border-radius: 8px;
  border: 1px solid #eee;
}

.qty-btn {
  background: transparent;
  border: none;
  font-size: 1.1rem;
  color: var(--purple);
  cursor: pointer;
}

.qty-btn:hover {
  transform: scale(1.1);
}

/* COUNT */
.item-count {
  min-width: 20px;
  text-align: center;
  font-weight: 600;
}

/* PRICE */
.allprise {
  font-weight: 700;
  white-space: nowrap;
  color: var(--purple2);
}

/* DELETE */
.delete-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  opacity: 0.6;
}

.delete-btn:hover {
  opacity: 1;
  color: #ff4d4d;
}

/* === FOOTER === */
.cart-footer {
  padding: 20px;
  border-top: 1px solid rgba(0, 0, 0, 0.05);
}

.total {
  margin: 0 0 20px 0;
  font-size: 1.3rem;
  display: flex;
  justify-content: space-between;
}

.checkout-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 50px;
  background: var(--liner-gradient-color);
  color: white;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(172, 66, 182, 0.4);
}

.checkout-btn:hover {
  transform: translateY(-3px);
}
</style>
<div class="cart" id="cartSidebar">
    <div class="cart-header">
        <h1 class="cart-title">Кошик</h1>
        <button class="close-btn" onclick="clouscart()">✕</button>
    </div>
<div class="cart-items">

            <h2 class="item-name">Стильна футболка</h2>

                <button class="qty-btn" onclick="subitem()">-</button>

                <button class="qty-btn" onclick="additem()">+</button>
            </div>
            
            <h3 class="allprise">₴ 850</h3>
            <button class="delete-btn" onclick="deleteitem()">🗑</button>
        </div> -->
        </div>

    <div class="cart-footer">
        <div class="totalprise">
            <hr>

        </div>

    </div>
</div>
